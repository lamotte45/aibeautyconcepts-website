<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're In — AI Beauty Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A227;--black:#0A0A0A;--dark:#111111;--white:#FFFFFF;--gray:#888888;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;}
.container{max-width:560px;}
.icon{width:80px;height:80px;border:1px solid rgba(201,162,39,0.4);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;font-size:32px;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,6vw,64px);font-weight:300;margin-bottom:16px;line-height:1.1;}
h1 em{font-style:italic;color:var(--gold);}
p{font-size:16px;color:var(--gray);font-weight:300;line-height:1.8;margin-bottom:40px;}
.tagline{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:48px;display:block;}
a{display:inline-block;background:transparent;border:1px solid rgba(201,162,39,0.4);color:var(--gold);padding:14px 36px;font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;transition:all 0.3s;}
a:hover{background:var(--gold);color:var(--black);}
</style>
</head>
<body>
<div class="container">
  <div class="icon">✦</div>
  <span class="tagline">Beta Registration Confirmed</span>
  <h1>You're <em>On the List</em></h1>
  <p>Thank you for joining the AI Beauty Concepts beta. We will send your TestFlight invite as soon as early access opens. Stay tuned — the future of beauty is almost here.</p>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
